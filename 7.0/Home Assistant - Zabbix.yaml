zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 7df96b18c230490a9a0a9e2307226338
      name: Templates
  templates:
    - uuid: 1d94437d4e37499bb2c5abf47fde6c00
      template: 'Home Assistant - Zabbix'
      name: 'Home Assistant - Zabbix'
      description: |
        Home Assistant Template, created by Thomas Rzen.
        
        To ensure this template operates correctly, the URL and API key should be stored in the Macros section.
        
        If you need help, visit https://github.com/Garfieldttt/zabbix-homeassistant.
      groups:
        - name: Templates
      items:
        - uuid: 2c4ed5c0c5be4840ac89801834efae58
          name: HA-raw
          type: HTTP_AGENT
          key: ha.raw
          history: '0'
          value_type: TEXT
          trends: '0'
          url: '{$HA.URL}/api/states'
          headers:
            - name: Authorization
              value: 'Bearer {$API.TOKEN}'
          output_format: JSON
          triggers:
            - uuid: 624a722e6f33407aa5bf3d610bc50f2c
              expression: 'nodata(/Home Assistant - Zabbix/ha.raw,900)=1 and {$HOST.REACHABLE}=1'
              name: 'The host is not reachable!'
              priority: HIGH
        - uuid: f77762bbd6df4dde9b5dbbf49160487e
          name: 'Home Assistant Core Update'
          type: DEPENDENT
          key: update.home.assistant.core.update
          delay: '0'
          trends: '0'
          valuemap:
            name: update
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.body[?(@.entity_id==''update.home_assistant_core_update'')].state'
            - type: LTRIM
              parameters:
                - '["'
            - type: RTRIM
              parameters:
                - '"]'
            - type: STR_REPLACE
              parameters:
                - 'on'
                - '1'
            - type: STR_REPLACE
              parameters:
                - 'off'
                - '0'
            - type: STR_REPLACE
              parameters:
                - unavailable
                - '2'
          master_item:
            key: ha.raw
          tags:
            - tag: 'Home Assistant'
              value: update-core
          triggers:
            - uuid: 2ce6c84c011e49c18efe116d031c26b2
              expression: 'last(/Home Assistant - Zabbix/update.home.assistant.core.update)=1'
              name: 'Home Assistant update for Home Assistant Core Update is available.'
              priority: AVERAGE
        - uuid: 352a320642644f3d9364d3d15759d517
          name: 'Home Assistant Supervisor Update'
          type: DEPENDENT
          key: update.home.assistant.supervisor.update
          delay: '0'
          trends: '0'
          valuemap:
            name: update
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.body[?(@.entity_id==''update.home_assistant_supervisor_update'')].state'
            - type: LTRIM
              parameters:
                - '["'
            - type: RTRIM
              parameters:
                - '"]'
            - type: STR_REPLACE
              parameters:
                - 'on'
                - '1'
            - type: STR_REPLACE
              parameters:
                - 'off'
                - '0'
            - type: STR_REPLACE
              parameters:
                - unavailable
                - '2'
          master_item:
            key: ha.raw
          tags:
            - tag: 'Home Assistant'
              value: update-supervisor
          triggers:
            - uuid: 19e42eea3cd2478a9af66c8cfe1e427a
              expression: 'last(/Home Assistant - Zabbix/update.home.assistant.supervisor.update)=1'
              name: 'Home Assistant update for Home Assistant supervisor Update is available.'
              priority: AVERAGE
      discovery_rules:
        - uuid: 4a40f645dc4d49218ff7460cb4704a96
          name: HA-backup.manager.state
          type: DEPENDENT
          key: backup.manager.state
          delay: '0'
          filter:
            conditions:
              - macro: '{#ENTITY_ID}'
                value: ^sensor\.backup_backup_manager_.+$
                formulaid: A
          item_prototypes:
            - uuid: 1ea35f8966a8415bb8838017e28c1439
              name: '{#FRIENDLY_NAME}'
              type: DEPENDENT
              key: 'backup.manager.state[{#ENTITY_ID}]'
              delay: '0'
              trends: '0'
              description: |
                | Number | State Key        | Description     |
                | ---: | :--------------- | :--------------- |
                |    0 | `idle`           | Idle             |
                |    1 | `create_backup`  | Creating backup  |
                |    2 | `receive_backup` | Receiving backup |
                |    3 | `restore_backup` | Restoring backup |
                |    4 | `blocked`        | Backup blocked   |
              valuemap:
                name: backup_manager
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.body[?(@.entity_id == "{#ENTITY_ID}")].state'
                - type: LTRIM
                  parameters:
                    - '["'
                - type: RTRIM
                  parameters:
                    - '"]'
                - type: STR_REPLACE
                  parameters:
                    - idle
                    - '0'
                - type: STR_REPLACE
                  parameters:
                    - create_backup
                    - '1'
                - type: STR_REPLACE
                  parameters:
                    - receive_backup
                    - '2'
                - type: STR_REPLACE
                  parameters:
                    - restore_backup
                    - '3'
                - type: STR_REPLACE
                  parameters:
                    - blocked
                    - '4'
              master_item:
                key: ha.raw
              tags:
                - tag: 'Home Assistant'
                  value: backup-manager-state
          master_item:
            key: ha.raw
          lld_macro_paths:
            - lld_macro: '{#ENTITY_ID}'
              path: $.entity_id
            - lld_macro: '{#FRIENDLY_NAME}'
              path: $.attributes.friendly_name
            - lld_macro: '{#UNITS}'
              path: $.attributes.unit_of_measurement
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.body[*]'
              error_handler: CUSTOM_VALUE
              error_handler_params: '[]'
        - uuid: 9191d005e6204149a071250e7f756bcd
          name: HA-addon-running
          type: DEPENDENT
          key: ha.addon.running
          delay: '0'
          filter:
            conditions:
              - macro: '{#ENTITY_ID}'
                value: '^binary_sensor\..*_running$'

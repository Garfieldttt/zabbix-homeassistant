                  parameters:
                    - '$.body[?(@.entity_id == "{#ENTITY_ID}")].state.first()'
                - type: STR_REPLACE
                  parameters:
                    - 'on'
                    - '1'
                - type: STR_REPLACE
                  parameters:
                    - 'off'
                    - '0'
                - type: STR_REPLACE
                  parameters:
                    - unknown
                    - '2'
                - type: STR_REPLACE
                  parameters:
                    - unavailable
                    - '2'
              master_item:
                key: ha.raw
              tags:
                - tag: 'Home Assistant'
                  value: addon-running
              trigger_prototypes:
                - uuid: 2f25a57799f84756a2ec0ba0263bce83
                  expression: 'last(/Home Assistant - Zabbix/addon.running[{#ENTITY_ID}])=0 and {$SWITCH.TRIGGER.ADDON.RUNNING}=1'
                  name: 'Add-on {#FRIENDLY_NAME} is not running'
                  priority: AVERAGE
                  manual_close: 'YES'
          master_item:
            key: ha.raw
          lld_macro_paths:
            - lld_macro: '{#ENTITY_ID}'
              path: $.entity_id
            - lld_macro: '{#FRIENDLY_NAME}'
              path: $.attributes.friendly_name
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.body[?(@.entity_id =~ "^binary_sensor\\..*_running$")]'
              error_handler: CUSTOM_VALUE
              error_handler_params: '[]'
